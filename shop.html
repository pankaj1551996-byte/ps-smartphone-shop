<!DOCTYPE html>
<html>
<head>
<title>P.S Shop</title>
<link rel="stylesheet" href="style.css">
<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
padding:30px;
}

.shop-title{
font-size:40px;
margin-bottom:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#161616;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(255,255,255,.05);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin-top:10px;
}

.price{
color:#ffd700;
font-size:20px;
font-weight:bold;
}

.btn{
background:#ffd700;
border:none;
padding:12px;
width:100%;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}
</style>
</head>

<body>

<h1 class="shop-title">🛒 P.S SHOP</h1>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/300x200">
<h3>Mobile Cover</h3>
<p class="price">₹199</p>
<button class="btn">Add To Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<h3>Tempered Glass</h3>
<p class="price">₹149</p>
<button class="btn">Add To Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<h3>Fast Charger</h3>
<p class="price">₹499</p>
<button class="btn">Add To Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<h3>Laptop Mouse</h3>
<p class="price">₹399</p>
<button class="btn">Add To Cart</button>
</div>

</div>

</body>
</html>
